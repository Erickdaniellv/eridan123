{% extends "base.html" %}

{% block title %}Registro de Inversiones{% endblock %}

{% block contenido %}
{% include 'navbar.html' %}



<div class="flex items-center justify-center min-h-screen"> <!-- Asegura un alto mínimo de pantalla y centra el contenido -->
    <div class="max-w-md w-full bg-white shadow-lg rounded-lg md:max-w-lg mx-4"> <!-- Ajusta márgenes según sea necesario -->
        <div class="p-4 px-5 py-5">
            <h1 class="text-2xl font-semibold leading-normal text-center mb-6">Registro de Inversión </h1> <!-- Centrado del título -->
            <h1 class="text-2xl font-semibold leading-normal text-center mb-6">{{ usuario.nombre_usuario }}</h1>
            
            <form action="{{ url_for('registro_inversion', user_id=usuario.id) }}" method="POST">
                {{ form.hidden_tag() }}
                <div class="grid gap-2 mt-5">
                    <input type="text" name="descripcion" placeholder="Descripción" class="py-2 px-3 rounded-lg border-2 border-gray-300 w-full focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent" required />
                    <input type="number" name="monto" placeholder="Monto" class="py-2 px-3 rounded-lg border-2 border-gray-300 w-full focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent" step="0.01" required />
                    <!-- Considera agregar un campo de fecha si es necesario y no se genera automáticamente -->
                </div>
                <div class="text-center mt-4 mb-3"> <!-- Centra el botón -->
                    <button type="submit" class="text-white bg-purple-600 hover:bg-purple-700 focus:ring-4 focus:ring-purple-300 font-medium rounded-lg text-sm px-5 py-2.5">Registrar Inversión</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>






{% endblock %}
